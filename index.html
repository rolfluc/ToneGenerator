<!DOCTYPE html>
<meta charset="UTF-8">
<body>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <header>
        <h1 id="generatedstring"></h1>
    </header>

    <main>
        <div class="tab-container">
            <label>
                <input type="radio" name="tabGroup" value="Tab 1">
                <div class="tab-button">Tone Creator</div>
            </label>
            
            <label>
                <input type="radio" name="tabGroup" value="Tab 2" checked>
                <div class="tab-button">Sound Deconstructor</div>
            </label>
        </div>
        <div class="chart-content" id="chartContentWrapper">
            <canvas id="rawCanvas" width="1024" height="768" style="border:1px solid #ccc;"></canvas>
            <div class="x-axis-labels" id="labelsContainer"></div>
        </div>
        <div class="controls" id="controls">
            <button id="startBtn" class="Tab 1">Start Audio</button>
            <button id="addNewInput" class="Tab 1">+</button>
            <input type="file" id="audioFile" accept=".mp3, .wav" disabled class="Tab 2">
        <div class="scroll-box" id="audioBox">
        </div>
    </div>
    </main>

</body>
