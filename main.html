<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Basic Webpage</title>
    <script src="script.js" defer></script>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <header>
        <h1 id="generatedstring"></h1>
    </header>

    <main>
        <div class="controls" id="controls">
        <button id="startBtn">Start Audio</button>
        <div>
            <div>
                <label>Frequency:</label>
                <input type="number" id="freq" value="440" min="20" max="20000" class="numeric-only">
            </div>
            <div>
                <label>Offset (ms):</label>
                <input type="number" id="offset" value="1000" min="50" max="100000" class="numeric-only">
            </div>
            <div>
                <label>Duration (ms):</label>
                <input type="number" id="duration" value="1000" min="50" max="100000" class="numeric-only">
            </div>
        </div>
    </div>
    </main>

</body>
</html>
