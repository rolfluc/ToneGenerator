<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Basic Webpage</title>
    <script src="script.js" defer></script>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <header>
        <h1 id="generatedstring"></h1>
    </header>

    <main>
        <div class="controls">
        <button id="startBtn">Start Audio</button>
        <div>
            <label>Frequency:</label>
            <input type="text" id="freq" value="440">
        </div>
        <div>
            <label>Offset:</label>
            <input type="text" id="offset" value="0.5">
        </div>
        <div>
            <label>Duration:</label>
            <input type="text" id="duration" value="0.5">
        </div>
    </div>
    </main>

</body>
</html>
