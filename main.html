<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Basic Webpage</title>
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Welcome to My Site</h1>
    </header>

    <main>
        <div class="controls">
            <h2>Perpetual Sine Wave Synth</h2>
        <button id="startBtn">Start Audio</button>
        <label>
            Frequency (Hz): <span id="freqValue">440</span>
            <input type="range" id="freqSlider" min="20" max="20000" value="440">
        </label>
        <label>
            Volume: <span id="volValue">0.5</span>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.5">
        </label>
    </div>
    </main>

</body>
</html>
